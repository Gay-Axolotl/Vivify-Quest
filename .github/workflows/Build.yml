name: Build QMOD

on:
  workflow_dispatch:
  push:
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - '**.yml'
      - '!.github/workflows/build.yml'

env:
  module_id: vivify

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true
          lfs: true

      - name: Install Ninja
        uses: seanmiddleditch/gha-setup-ninja@v5

      - name: Delete lock file before QPM runs
        run: rm -f qpm.shared.json

      - name: QPM install & NDK setup
        uses: Fernthedev/qpm-action@v1
        with:
          workflow_token: ${{ secrets.GITHUB_TOKEN }}
          restore: false
          resolve_ndk: true
          cache: false

      - name: QPM restore (fresh, no lock file)
        run: qpm restore

      - name: QPM collapse
        run: qpm collapse

      - name: Build
        run: |
          export ANDROID_NDK_HOME=$(qpm ndk resolve)
          cmake -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=24 \
            -DANDROID_STL=c++_static \
            -DANDROID_USE_LEGACY_TOOLCHAIN_FILE=OFF \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake \
            -B build .
          cmake --build build --config Release

      - name: Package QMOD
        run: |
          cp mod.json build/mod.json
          cd build
          zip -r ../Vivify.qmod libvivify.so ../mod.json $(find ../extern/libs -name "*.so" 2>/dev/null)

      - name: Upload QMOD
        uses: actions/upload-artifact@v4
        with:
          name: Vivify.qmod
          path: ./Vivify.qmod
          if-no-files-found: error

      - name: Upload .so
        uses: actions/upload-artifact@v4
        with:
          name: libvivify.so
          path: ./build/libvivify.so
          if-no-files-found: warn
